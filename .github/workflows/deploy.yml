name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
  schedule:
    # Every 8 hours = 3 times a day
    - cron: '0 */8 * * *'

jobs:
  deploy:
    # Do not run the scheduled workflow on forks
    if: github.event != 'schedule' || github.repository_owner == 'Cockatrice'

    runs-on: ubuntu-latest

    env:
      DEPLOY: ${{github.ref == 'refs/heads/master'}}
      OUTPUT_PATH: out

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Install requirements
        shell: bash
        env:
          CFLAGS: '-O0'
        run: |
          python3 -m pip install --upgrade pip setuptools
          python3 -m pip install --requirement requirements.txt

      - name: Run script
        id: run
        shell: bash
        run: python3 -m magic_spoiler

      - name: Upload script output
        # Run only when triggered from a PR
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v2
        with:
          name: spoiler-output
          path: ${{github.workspace}}/${{env.OUTPUT_PATH}}
          if-no-files-found: error

      - name: Deploy changes
        # Run only when triggered from master and changes are available
        if: env.DEPLOY == 'true' && steps.run.outputs.deploy == 'true'
        shell: bash
        working-directory: ${{env.OUTPUT_PATH}}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Deploy: $GITHUB_SHA"
          git push
          deploy_commit=`git rev-parse HEAD`
          echo
          echo "See deployment: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$deploy_commit"

      - name: Create release
        # Run only
        if: steps.configure.outputs.tag != null
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{github.token}}
        with:
          tag_name: ${{github.ref}}
          release_name: Current Spoiler Season
          body_path: link changelog (compare)
          draft: false
          prerelease: true
          #TODO: do normal releases once spoiler season is over and archive output

      - name: Upload to release
        # Run only
        if: matrix.package != 'skip' && needs.configure.outputs.tag != null
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{github.token}}
        with:
          upload_url: 
          asset_path: ./out
          asset_name: 
          #TODO: upload several individual files from one run/directory
